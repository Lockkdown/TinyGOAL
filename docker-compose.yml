services:
  postgres:
    image: postgres:16-alpine
    container_name: tinygoal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Pp1282Pp
      POSTGRES_DB: tinygoal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
